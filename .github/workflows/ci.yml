name: Spring Boot Kotlin CI

# 1. Cuándo se va a ejecutar este pipeline
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    # 2. El entorno donde correrá nuestro código
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Clonar el código del repositorio
      - name: Checkout del código
        uses: actions/checkout@v4

      # Paso 2: Configurar Java (Asumo Java 17, cámbialo a 21 si usas esa versión)
      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle' # 💡 Tip Senior: Cachea las dependencias para que no se descarguen en cada push

      # Paso 3: Dar permisos de ejecución al Wrapper de Gradle
      - name: Otorgar permisos al gradlew
        run: chmod +x gradlew
        continue-on-error: true

      # Paso 4: Ejecutar Tests y Compilar el proyecto
      - name: Compilar y correr Tests
        run: ./gradlew build

      # Paso 5: (Opcional) Guardar el JAR generado como un artefacto descargable
      - name: Subir artefacto (JAR)
        uses: actions/upload-artifact@v4
        if: success() # Solo se sube si los tests pasaron
        with:
          name: spring-boot-app
          path: build/libs/*SNAPSHOT.jar
          retention-days: 7

      # Paso 6: 🐳 Docker Build (Verificación Opcional)
      - name: 🐳 Docker Build (Verificación Opcional)
        run: |
          if [ -f Dockerfile ]; then
            docker build -t finanzauto-back:latest .
            echo "✅ Imagen Docker del Backend construida con éxito."
          else
            echo "⚠️ No se encontró Dockerfile en la carpeta backend, saltando paso."
          fi

      # Paso 7: 🚀 Docker Run (Verificación Opcional)
      - name: 🚀 Docker Run (Verificación Opcional)
        run: |
          if [ -f Dockerfile ]; then
            docker run -d -p 8080:8080 finanzauto-back:latest
            echo "✅ Contenedor Docker del Backend iniciado en el puerto 8080."
          fi

      # Paso 8: 🧪 Ejecutar Tests de Integración (Opcional)
      - name: 🧪 Ejecutar Tests de Integración (Opcional)
        run: |
          if [ -f Dockerfile ]; then
            echo "Simulando tests de integración..."
            sleep 10 # Simula la ejecución de tests
            echo "✅ Tests de integración completados."
          fi

      # Paso 9: 🧹 Docker Stop y Clean (Opcional)
      - name: 🧹 Docker Stop y Clean (Opcional)
        if: always() # Ejecutar siempre, incluso si los pasos anteriores fallan
        run: |
          if [ -f Dockerfile ]; then
            docker stop $(docker ps -a -q --filter ancestor=finanzauto-back:latest) || true
            docker rm $(docker ps -a -q --filter ancestor=finanzauto-back:latest) || true
            echo "✅ Contenedores Docker detenidos y eliminados."
          fi
