    expiration: 86400000 # 24 hours in milliseconds
  datasource:
      url: jdbc:mysql://localhost:5432/bdd_proof_finanzaauto?createDatabaseIfNotExist=true
      username: admin_proof
      password: finanzaauto_2026*
      driver-class-name: com.mysql.cj.jdbc.Driver
